# Blueprint defaults for this repo. This service must run from backend/ so
# auth routes (/auth/signup, /auth/login) and realtime routes are both available.

services:
  - type: web
    name: sleepydrive-gateway
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port $PORT
